services:
  postgres:
    image: postgres:16-alpine
    container_name: fv-postgres
    environment:
      POSTGRES_DB: erp_vendas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fv-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fv-backend
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/erp_vendas
      - ACTIVE_ERP=${ACTIVE_ERP:-veloflow}
      - VELOFLOW_API_URL=${VELOFLOW_API_URL:-}
      - VELOFLOW_API_TOKEN=${VELOFLOW_API_TOKEN:-}
      - VELOFLOW_TIMEOUT=${VELOFLOW_TIMEOUT:-30}
      - VELOFLOW_RETRY_ATTEMPTS=${VELOFLOW_RETRY_ATTEMPTS:-3}
      - VELOFLOW_VERIFY_SSL=${VELOFLOW_VERIFY_SSL:-False}
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET:-forcevendas-pro-secret-key-change-in-production}
      - SYNC_INTERVAL_MINUTES=${SYNC_INTERVAL_MINUTES:-30}
      - SYNC_FULL_HOUR=${SYNC_FULL_HOUR:-3}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - fv-network
    labels:
      - "coolify.managed=true"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: fv-frontend
    ports:
      - "${PORT:-3005}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fv-network
    labels:
      - "coolify.managed=true"
      - "coolify.proxy=true"
      - "coolify.destination.port=80"

volumes:
  pgdata:

networks:
  fv-network:
    driver: bridge
